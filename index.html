<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor P2P Bolivia</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 15px; color: #333; background-color: #f4f7f6; padding-bottom: 50px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Estructura del Header */
        h1 { font-size: 1.5rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        select { padding: 5px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; }
        
        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 20px;
            gap: 20px;
        }

        .info-left { font-size: 0.95rem; line-height: 1.6; }
        .author { font-weight: bold; color: #333; }
        .update-time { color: #666; font-size: 0.9rem; }

        /* Tasas FIAT a la derecha - Ajustado para claridad */
        .fiat-right { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 10 rem; 
            text-align: left; 
            white-space: pre; 
            line-height: 1.4;
            color: #000;
            background: #fff;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .fiat-label { font-weight: bold; display: inline-block; width: 130px; font-family: 'Segoe UI', sans-serif; }

        /* Estilos Tablas y Secciones */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 10px 0; font-size: 1.1rem; font-weight: bold; }
        .summary-card { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #e0e0e0; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stats { display: flex; gap: 15px; font-size: 0.85rem; margin-bottom: 10px; flex-wrap: wrap; }
        .controls { display: flex; gap: 8px; align-items: center; font-size: 0.75rem; border-top: 1px solid #eee; padding-top: 10px; }
        .controls label { background: #fff; border: 1px solid #ddd; padding: 2px 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }

        .table-scroll-container { width: 100%; overflow-x: auto; background: #fff; border-radius: 8px; border: 1px solid #ddd; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; white-space: nowrap; text-align: right; }
        th { background: #f8f9fa; color: #666; font-weight: 600; }
        
        .col-precio { text-align: left; font-weight: bold; width: 1%; min-width: 85px; }
        .col-dist-header, .col-dist-data { width: auto !important; text-align: left; min-width: 150px; }
        .dist-bar { font-size: 8px; letter-spacing: -1px; display: block; line-height: 1; }
        
        #bybitExtraPanel { display: none; margin-top: 30px; border-top: 3px solid #2ebd85; padding-top: 10px; }
        .label-ejecucion { font-size: 1rem; font-weight: bold; display: block; margin: 15px 0 8px 0; }

        .loading { text-align: center; padding: 30px; color: #666; }
        .error { color: red; padding: 10px; font-size: 0.8rem; }
        footer { margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid #ddd; font-size: 1rem; background: #fff; border-radius: 10px; }

        @media (max-width: 768px) {
            .header-flex { flex-direction: column; gap: 10px; }
            .fiat-right { font-size: 0.75rem; white-space: pre; width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📈 
            <select id="exchangeSelector" onchange="loadData()">
                <option value="binance">BINANCE</option>
                <option value="bybit">BYBIT</option>
                <option value="bitget">BITGET</option>
            </select> 
            (USDT/BOB)
        </h1>
        
        <div class="header-flex">
            <div class="info-left">
                <div class="author">By: <strong>Chelotex</strong></div>
                <div id="updateTime" class="update-time">Actualización: --:--:--</div>
            </div>
            <div id="fiatRates" class="fiat-right">Cargando tasas bancarias...</div>
        </div>
    </header>

    <div id="mainContent">
        <div class="loading">Cargando datos...</div>
    </div>

    <div id="bybitExtraPanel">
        <div class="section-header">
            <span>📊 Órdenes Ejecutadas</span>
            <select id="limitResumen" style="font-size: 0.8rem;" onchange="refreshExtraPanel()">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="999">Todo</option>
            </select>
        </div>
        <div id="compactContent"></div>
    </div>

    <div id="bybitOrdersPanel" style="display:none; margin-top:30px; border-top:3px solid #ff9800; padding-top:10px;">
        <div class="section-header"><span>🛒 Órdenes Activas</span></div>
        <div id="ordersContent"></div>
    </div>

    <footer>
        Contacto: <a href="https://wa.me/59176543021" style="color:#25D366; text-decoration:none; font-weight:bold;">76543021</a>
    </footer>
</div>

<script>
    const API_BASE_URL = "https://apicollector-production.up.railway.app/p2p";
    const API_ORDERS_URL = "https://apicollector-production.up.railway.app/bybit/ordenes";
    const API_FIAT_URL = "https://apicollector-production.up.railway.app/fiat/ultimo";
    
    let currentLimits = { buy: 5, sell: 5 };
    let cachedData = null;
    const fmtVol = new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 });
    const fmtVolDec = new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 });

    function formatPrecio(valor) {
        const exchange = document.getElementById('exchangeSelector').value;
        const decimales = exchange === 'bybit' ? 3 : 2;
        return new Intl.NumberFormat('en-US', { minimumFractionDigits: decimales, maximumFractionDigits: decimales }).format(valor);
    }

    async function loadData() {
        const exchange = document.getElementById('exchangeSelector').value;
        loadFiatData();
        try {
            const response = await fetch(`${API_BASE_URL}/${exchange}`);
            if (!response.ok) throw new Error("API P2P Error");
            const data = await response.json();
            cachedData = data;
            renderDashboard(data);
            
            if (exchange === 'bybit') {
                document.getElementById('bybitExtraPanel').style.display = 'block';
                document.getElementById('bybitOrdersPanel').style.display = 'block';
                renderExtraPanel(data);
                loadOrdersData();
            } else {
                document.getElementById('bybitExtraPanel').style.display = 'none';
                document.getElementById('bybitOrdersPanel').style.display = 'none';
            }
        } catch (err) {
            document.getElementById('mainContent').innerHTML = `<div class="error">Error: ${err.message}</div>`;
        }
    }

    async function loadFiatData() {
        const fiatContainer = document.getElementById('fiatRates');
        try {
            const response = await fetch(API_FIAT_URL);
            const data = await response.json();
            const f = data.fuentes;

            // Se añade BCB, BCP y BISA manteniendo la alineación solicitada
            fiatContainer.innerHTML = 
                `<span class="fiat-label">BCB Referencial</span>  Venta: ${f.BCB.venta.toFixed(2)}  Compra: ${f.BCB.compra.toFixed(2)}\n` +
                `<span class="fiat-label">BCP USDT</span>  Venta: ${f.BCP.venta.toFixed(2)}  Compra: ${f.BCP.compra.toFixed(2)}\n` +
                `<span class="fiat-label">BISA USDT</span>  Venta: ${f.BISA.venta.toFixed(2)}  Compra: ${f.BISA.compra.toFixed(2)}`;
        } catch (err) {
            fiatContainer.innerHTML = `<span class="error">Error Tasas FIAT</span>`;
        }
    }

    async function loadOrdersData() {
        try {
            const response = await fetch(API_ORDERS_URL);
            const data = await response.json();
            renderOrdersTable(data.ordenes);
        } catch (err) { console.error(err); }
    }

    function renderOrdersTable(ordenes) {
        const container = document.getElementById('ordersContent');
        let html = "";
        const tipos = [{ k: 'Compra', t: '🟢 COMPRAS ACTIVAS', c: '#2ebd85' }, { k: 'Venta', t: '🔴 VENTAS ACTIVAS', c: '#f6465d' }];
        tipos.forEach(tipo => {
            const lista = ordenes[tipo.k] || [];
            if (lista.length === 0) return;
            html += `<span class="label-ejecucion" style="color:${tipo.c}">${tipo.t}</span>
                <div class="table-scroll-container"><table><thead><tr><th>Precio</th><th>Usuario</th><th>Monto</th></tr></thead><tbody>
                ${lista.map(o => `<tr><td style="color:${tipo.c}; font-weight:bold">${formatPrecio(o.precio)}</td><td style="text-align:center">${o.usuario ? o.usuario.charAt(0) + "***" : "***"}</td><td>${fmtVolDec.format(o.monto)}</td></tr>`).join('')}
                </tbody></table></div>`;
        });
        container.innerHTML = html || "<p>Sin órdenes.</p>";
    }

function renderDashboard(data) {
        const date = new Date(data.timestamp * 1000);
        document.getElementById('updateTime').innerHTML = `Actualización: ${date.toLocaleTimeString('es-BO', {hour12:false})}`;
        let html = "";
        data.resultados.forEach(res => {
            const type = res.trade_type;
            const prefix = type.toLowerCase();
            const color = type === "BUY" ? "#2ebd85" : "#f6465d";
            const limit = currentLimits[prefix];
            
            // Agrupar y ordenar datos
            let entries = Object.entries(res.datos_agrupados).map(([p, v]) => ({ precio: parseFloat(p), ...v })).sort((a, b) => type === "BUY" ? a.precio - b.precio : b.precio - a.precio);
            
            // Aplicar el límite visual seleccionado (5, 10 o Todas)
            const display = entries.slice(0, limit === 999 ? entries.length : limit);
            
            // Cálculos para la summary-card (solo de lo que se muestra)
            const volT = display.reduce((acc, curr) => acc + curr.suma, 0);
            const volInmT = display.reduce((acc, curr) => acc + (curr.inmediato || 0), 0);
            const adsT = display.reduce((acc, curr) => acc + (curr.conteo || 0), 0); // Nueva suma de Ads

            html += `<div class="section-header"><span>${type === "BUY" ? "🟢 Ofertas de Compra" : "🔴 Ofertas de Venta"}</span>
                <select style="font-size:0.8rem;" onchange="updateLimit('${prefix}', this.value)">
                <option value="5" ${limit==5?'selected':''}>5</option><option value="10" ${limit==10?'selected':''}>10</option><option value="15" ${limit==15?'selected':''}>15</option><option value="20" ${limit==20?'selected':''}>20</option><option value="999" ${limit==999?'selected':''}>Todas</option></select></div>
                <div class="summary-card">
                    <div class="stats">
                        <span>Volumen: <strong>${fmtVol.format(volT)}</strong></span>
                        <span>Vol. Inm: <strong>${fmtVol.format(volInmT)}</strong></span>
                        <span>Ads: <strong>${adsT}</strong></span>
                    </div>
                    <div class="controls">
                        <label><input type="checkbox" checked onchange="toggleCol('${prefix}-inm', this.checked)"> ⚡ Inm.</label>
                        <label><input type="checkbox" checked onchange="toggleCol('${prefix}-min', this.checked)"> 📉 Min</label>
                        <label><input type="checkbox" checked onchange="toggleCol('${prefix}-max', this.checked)"> 📈 Max</label>
                    </div>
                </div>
                <div class="table-scroll-container"><table><thead><tr>
                <th class="col-precio">Precio</th><th>Ads</th><th>Volumen</th>
                <th class="${prefix}-inm">⚡ Inm.</th><th class="${prefix}-min">📉 Min</th><th class="${prefix}-max">📈 Max</th>
                <th class="col-dist-header">Dist.</th></tr></thead><tbody>
                ${display.map(e => `<tr><td class="col-precio" style="color:${color}">${formatPrecio(e.precio)}</td><td>${e.conteo}</td><td>${fmtVol.format(e.suma)}</td>
                <td class="${prefix}-inm">${fmtVol.format(e.inmediato || 0)}</td><td class="${prefix}-min">${fmtVol.format(e.min || 0)}</td><td class="${prefix}-max">${fmtVol.format(e.max || 0)}</td>
                <td class="col-dist-data"><span class="dist-bar" style="color:${color}">${'⬛'.repeat(volT > 0 ? Math.floor((e.suma / volT) * 30) : 0)}</span></td></tr>`).join('')}
                </tbody></table></div>`;
        });
        document.getElementById('mainContent').innerHTML = html;
        applySavedColumnVisibility();
    }

    function renderExtraPanel(data) {
        const limit = parseInt(document.getElementById('limitResumen').value);
        let html = "";
        data.resultados.forEach(res => {
            const color = res.trade_type === "BUY" ? "#2ebd85" : "#f6465d";
            let entries = Object.entries(res.datos_agrupados).map(([p, info]) => ({ precio: parseFloat(p), ...info })).filter(e => e.volumen_ejecutado > 0);
            if (entries.length === 0) return;
            entries.sort((a, b) => res.trade_type === "BUY" ? a.precio - b.precio : b.precio - a.precio);
            html += `<span class="label-ejecucion" style="color:${color}">${res.trade_type === "BUY" ? "🟢 EJECUCIÓN COMPRA" : "🔴 EJECUCIÓN VENTA"}</span>
                <div class="table-scroll-container"><table><thead><tr><th class="col-precio">Precio</th><th>Ejecutado</th><th>Proceso</th></tr></thead><tbody>
                ${entries.slice(0, limit).map(e => `<tr><td class="col-precio" style="color:${color}">${formatPrecio(e.precio)}</td><td>${fmtVolDec.format(e.volumen_ejecutado)}</td><td>${fmtVolDec.format(e.volumen_en_proceso || 0)}</td></tr>`).join('')}
                </tbody></table></div>`;
        });
        document.getElementById('compactContent').innerHTML = html || "<p>Sin datos de ejecución.</p>";
    }

    function updateLimit(t, v) { currentLimits[t] = parseInt(v); if (cachedData) renderDashboard(cachedData); }
    function toggleCol(cls, show) { document.querySelectorAll('.' + cls).forEach(el => el.style.display = show ? '' : 'none'); localStorage.setItem(cls, show); }
    function refreshExtraPanel() { if (cachedData) renderExtraPanel(cachedData); }
    
    function applySavedColumnVisibility() {
        ['buy-inm', 'buy-min', 'buy-max', 'sell-inm', 'sell-min', 'sell-max'].forEach(cls => {
            const saved = localStorage.getItem(cls);
            if (saved !== null) {
                const isVisible = (saved === 'true');
                const checkbox = document.querySelector(`input[onchange*="'${cls}'"]`);
                if (checkbox) checkbox.checked = isVisible;
                toggleCol(cls, isVisible);
            }
        });
    }

    setInterval(loadData, 30000);
    window.onload = loadData;
</script>
</body>
</html>
