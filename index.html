<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor P2P Bolivia</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 15px; color: #333; background-color: #f4f7f6; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        select { padding: 5px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; }
        .author { font-size: 0.9rem; margin: 0; color: #666; }
        .update-time { font-size: 0.85rem; margin-bottom: 15px; color: #444; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 10px 0; font-size: 1.1rem; font-weight: bold; }
        .summary-card { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #e0e0e0; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stats { display: flex; gap: 15px; font-size: 0.85rem; margin-bottom: 10px; flex-wrap: wrap; }
        .controls { display: flex; gap: 8px; align-items: center; font-size: 0.75rem; border-top: 1px solid #eee; padding-top: 10px; }
        .controls label { background: #fff; border: 1px solid #ddd; padding: 2px 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }

        /* Estilos de Columnas Ajustadas */
        .table-scroll-container { width: 100%; overflow-x: auto; background: #fff; border-radius: 8px; border: 1px solid #ddd; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th, td { 
            padding: 10px 12px; 
            border-bottom: 1px solid #eee; 
            font-size: 0.85rem; 
            white-space: nowrap; 
            width: 1%; 
        }
        th { background: #f8f9fa; color: #666; font-weight: 600; text-align: right; }
        td { text-align: right; }

        /* Columna de Distribución: Consume el resto del espacio */
        .col-dist-header, .col-dist-data { 
            width: auto !important; 
            text-align: left; 
            min-width: 150px; 
        }
        
        .col-precio { text-align: left; font-weight: bold; }
        .dist-bar { font-size: 8px; letter-spacing: -1px; display: block; line-height: 1; }
        
        .loading { text-align: center; padding: 50px; color: #666; }
        .error { color: red; padding: 20px; background: #ffe6e6; border-radius: 8px; font-size: 0.9rem; }
        .scroll-hint { font-size: 0.7rem; color: #999; text-align: right; margin-bottom: 4px; display: none; }

        @media (max-width: 600px) {
            .scroll-hint { display: block; }
            .stats span { width: 100%; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📈 
            <select id="exchangeSelector" onchange="loadData()">
                <option value="binance">BINANCE</option>
                <option value="bybit">BYBIT</option>
                <option value="bitget">BITGET</option>
            </select> 
            (USDT/BOB)
        </h1>
        <p class="author">By: <strong>Chelotex</strong></p>
        <div id="updateTime" class="update-time"></div>
    </header>

    <div id="mainContent">
        <div class="loading">Cargando monitor...</div>
    </div>
</div>

<script>
    const API_BASE_URL = "https://apicollector-production.up.railway.app/p2p";
    let currentLimits = { buy: 5, sell: 5 };
    const fmt = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtVol = new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 });

    async function loadData() {
        const exchange = document.getElementById('exchangeSelector').value;
        try {
            const response = await fetch(`${API_BASE_URL}/${exchange}`);
            if (!response.ok) throw new Error("Error en respuesta de API");
            const data = await response.json();
            renderDashboard(data);
        } catch (err) {
            document.getElementById('mainContent').innerHTML = `<div class="error">❌ Error de conexión: ${err.message}. Revisa si la API tiene CORS habilitado.</div>`;
        }
    }

    function renderDashboard(data) {
        const container = document.getElementById('mainContent');
        const updateEl = document.getElementById('updateTime');
        
        const date = new Date(data.timestamp * 1000);
        date.setHours(date.getHours() - 4);
        updateEl.innerHTML = `Actualización: <strong>${date.toLocaleString('es-BO')}</strong>`;

        let html = "";

        data.resultados.forEach(res => {
            const type = res.trade_type;
            const prefix = type.toLowerCase();
            const color = type === "BUY" ? "#2ebd85" : "#f6465d";
            const titulo = type === "BUY" ? "🟢 Ofertas de Compra" : "🔴 Ofertas de Venta";
            const limit = currentLimits[prefix];

            let entries = Object.entries(res.datos_agrupados)
                .map(([p, v]) => ({ precio: parseFloat(p), ...v }))
                .sort((a, b) => type === "BUY" ? a.precio - b.precio : b.precio - a.precio);

            const displayEntries = entries.slice(0, limit === 999 ? entries.length : limit);
            
            const volTotal = displayEntries.reduce((acc, curr) => acc + curr.suma, 0);
            const volInm = displayEntries.reduce((acc, curr) => acc + (curr.inmediato || 0), 0);
            const adsCount = displayEntries.reduce((acc, curr) => acc + curr.conteo, 0);

            html += `
                <div class="section-header">
                    <span>${titulo}</span>
                    <select style="font-size: 0.8rem;" onchange="updateLimit('${prefix}', this.value)">
                        <option value="5" ${limit == 5 ? 'selected' : ''}>5</option>
                        <option value="10" ${limit == 10 ? 'selected' : ''}>10</option>
                        <option value="15" ${limit == 15 ? 'selected' : ''}>15</option>
                        <option value="999" ${limit == 999 ? 'selected' : ''}>Todas</option>
                    </select>
                </div>

                <div class="summary-card">
                    <div class="stats">
                        <span>Volumen: <strong>${fmtVol.format(volTotal)} USDT</strong></span>
                        <span>Vol. Inmediato: <strong>${fmtVol.format(volInm)} USDT</strong></span>
                        <span>Ads: <strong>${adsCount}</strong></span>
                    </div>
                    <div class="controls">
                        <label><input type="checkbox" checked onchange="toggleCol('${prefix}-inm', this.checked)"> ⚡ Inmediato</label>
                        <label><input type="checkbox" checked onchange="toggleCol('${prefix}-min', this.checked)"> 📉 Min</label>
                        <label><input type="checkbox" checked onchange="toggleCol('${prefix}-max', this.checked)"> 📈 Max</label>
                    </div>
                </div>

                <p class="scroll-hint">← Desliza para ver Distribución ⬛ →</p>
                <div class="table-scroll-container">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-precio" style="text-align: left">Precio</th>
                                <th>👤 Ads</th>
                                <th>💰 Volumen</th>
                                <th class="${prefix}-inm">⚡ Inmediato</th>
                                <th class="${prefix}-min">📉 Min</th>
                                <th class="${prefix}-max">📈 Max</th>
                                <th class="col-dist-header">Distribución</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${displayEntries.map(e => {
                                const modulo = volTotal > 0 ? Math.floor((e.suma / volTotal) * 40) : 0;
                                return `
                                <tr>
                                    <td class="col-precio" style="color: ${color}">${fmt.format(e.precio)}</td>
                                    <td>${e.conteo}</td>
                                    <td>${fmtVol.format(e.suma)}</td>
                                    <td class="${prefix}-inm">${fmtVol.format(e.inmediato || 0)}</td>
                                    <td class="${prefix}-min">${fmtVol.format(e.min || 0)}</td>
                                    <td class="${prefix}-max">${fmtVol.format(e.max || 0)}</td>
                                    <td class="col-dist-data"><span class="dist-bar" style="color: ${color}">${'⬛'.repeat(modulo)}</span></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">`;
        });

        container.innerHTML = html;
        applySavedColumnVisibility();
    }

    function updateLimit(type, val) {
        currentLimits[type] = parseInt(val);
        loadData();
    }

    function toggleCol(cls, show) {
        document.querySelectorAll('.' + cls).forEach(el => el.style.display = show ? '' : 'none');
        localStorage.setItem(cls, show);
    }

    function applySavedColumnVisibility() {
        ['buy-inm', 'buy-min', 'buy-max', 'sell-inm', 'sell-min', 'sell-max'].forEach(cls => {
            const saved = localStorage.getItem(cls);
            if (saved !== null) {
                const isVisible = (saved === 'true');
                const checkbox = document.querySelector(`input[onchange*="'${cls}'"]`);
                if (checkbox) checkbox.checked = isVisible;
                toggleCol(cls, isVisible);
            }
        });
    }

    setInterval(loadData, 30000);
    window.onload = loadData;
</script>
</body>
</html>
